<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
    :root { --rso-blue: #002d72; }
    body { background: #0a0a0a; color: white; margin: 0; font-family: 'Montserrat', sans-serif; }
    
    .title-banner { padding: 80px 40px; background: linear-gradient(to right, #005fb8, #002d72); }
    .title-banner h1 { font-family: 'Bebas Neue'; font-size: clamp(40px, 8vw, 100px); margin: 0; }

    /* Contenedor de Galería 3x6 */
    .gallery-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
    
    .gallery-grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); /* 3 columnas fijas */
        gap: 20px; 
    }

    .gallery-grid a { 
        display: block; 
        aspect-ratio: 3 / 4; /* Mantiene todas las fotos con la misma proporción */
        border-radius: 4px; 
        overflow: hidden; 
        transition: transform 0.4s ease;
        background: #111;
    }

    .gallery-grid img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        display: block;
        transition: 0.5s;
    }

    .gallery-grid a:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .gallery-grid a:hover img { transform: scale(1.05); }

    /* Navegación final */
    .nav-buttons { display: flex; justify-content: center; gap: 20px; padding: 100px 20px; }
    .btn { padding: 15px 30px; font-family: 'Bebas Neue'; font-size: 1.5rem; text-decoration: none; border-radius: 4px; border: 2px solid white; color: white; transition: 0.3s; }
    .btn:hover { background: white; color: black; }

    /* Ajuste para tablets y móviles */
    @media (max-width: 900px) { 
        .gallery-grid { grid-template-columns: repeat(2, 1fr); } /* 2 columnas en tablets */
    }
    @media (max-width: 600px) {
        .gallery-grid { gap: 10px; } /* Menos espacio en móviles */
    }
</style>
</head>
