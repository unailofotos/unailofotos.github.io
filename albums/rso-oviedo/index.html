<title>RSO - OVIEDO | UNAILOFOTOS</title>

<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<style>
    :root { 
        --rso-blue: #002d72; 
        --pure-white: #ffffff; 
        --neon: #00d4ff; 
    }

    /* MANTENIDO: El fondo diagonal que identifica tu marca */
    body { 
        background: linear-gradient(135deg, var(--pure-white) 0%, var(--pure-white) 50%, var(--rso-blue) 50%, var(--rso-blue) 100%);
        background-attachment: fixed;
        margin: 0; 
        font-family: 'Montserrat', sans-serif; 
        color: #000;
        overflow-x: hidden;
    }

    /* Banner de título con degradado optimizado */
    .title-banner { 
        height: 40vh; 
        display: flex; 
        align-items: flex-end; 
        padding: 40px 60px; 
        background: linear-gradient(to bottom, rgba(0,45,114,0.8), transparent); 
        position: relative; 
    }
    .title-banner h1 { 
        font-family: 'Bebas Neue'; 
        font-size: clamp(50px, 10vw, 120px); 
        margin: 0; 
        color: var(--pure-white); 
        text-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        z-index: 5;
        letter-spacing: 2px;
    }

    /* Galería de alto rendimiento */
    .gallery-container {
        max-width: 1400px;
        margin: auto;
        padding: 20px;
    }

    .gallery-cascada { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
        gap: 20px; 
    }

    .gallery-cascada a { 
        position: relative;
        overflow: hidden; 
        height: 450px; 
        background: var(--pure-white);
        border-radius: 4px; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        will-change: transform; /* Activa la GPU para un scroll suave */
    }

    .gallery-cascada img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        transition: 0.6s ease;
        display: block;
    }

    /* Efectos al pasar el ratón */
    .gallery-cascada a:hover { 
        transform: translateY(-8px); 
        box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        z-index: 10;
    }
    
    .gallery-cascada a:hover img { 
        transform: scale(1.05);
    }

    /* Etiqueta flotante "Ampliar" */
    .gallery-cascada a::after { 
        content: "AMPLIAR"; 
        position: absolute; 
        bottom: 20px; 
        left: 20px;
        background: var(--rso-blue);
        color: white;
        padding: 5px 15px;
        font-family: 'Bebas Neue';
        font-size: 1.2rem;
        opacity: 0;
        transform: translateY(10px);
        transition: 0.3s;
    }
    .gallery-cascada a:hover::after { opacity: 1; transform: translateY(0); }

    /* Botón de salida estilo deportivo */
    .footer-nav { text-align: center; padding: 100px 20px; }
    .btn-exit { 
        display: inline-block; 
        padding: 15px 40px; 
        background: var(--rso-blue); 
        color: var(--pure-white); 
        text-decoration: none; 
        font-family: 'Bebas Neue'; 
        font-size: 1.6rem; 
        letter-spacing: 2px; 
        border: 3px solid var(--pure-white);
        transition: 0.3s; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .btn-exit:hover { 
        background: var(--pure-white); 
        color: var(--rso-blue); 
        transform: scale(1.05);
    }

    @media (max-width: 768px) {
        .title-banner { padding: 30px; height: 30vh; }
        .gallery-cascada { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
    }
</style>
</head>
