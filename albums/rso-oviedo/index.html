<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
    :root { --rso-blue: #002d72; }
    body { background: #0a0a0a; color: white; margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
    
    /* Header Minimalista */
    .title-banner { 
        padding: 100px 40px 60px; 
        background: linear-gradient(to right, #005fb8, #002d72); 
        text-align: left;
    }
    .title-banner h1 { 
        font-family: 'Bebas Neue'; 
        font-size: clamp(50px, 10vw, 120px); 
        margin: 0; 
        letter-spacing: 2px; 
        line-height: 1;
    }

    /* Galería Organizada */
    .gallery-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
    
    .gallery-grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 20px; 
    }

    .gallery-grid a { 
        display: block; 
        aspect-ratio: 3 / 4; 
        border-radius: 4px; 
        overflow: hidden; 
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        background: #111;
    }

    .gallery-grid img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        display: block;
        transition: 0.6s ease;
    }

    .gallery-grid a:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); z-index: 10; }
    .gallery-grid a:hover img { transform: scale(1.05); }

    /* Botón de navegación */
    .nav-buttons { display: flex; justify-content: center; padding: 100px 20px; }
    .btn { 
        padding: 18px 45px; 
        font-family: 'Bebas Neue'; 
        font-size: 1.6rem; 
        text-decoration: none; 
        border: 2px solid white; 
        color: white; 
        transition: 0.3s; 
        letter-spacing: 2px;
    }
    .btn:hover { background: white; color: black; transform: scale(1.05); }

    /* Responsivo */
    @media (max-width: 900px) { 
        .gallery-grid { grid-template-columns: repeat(2, 1fr); } 
        .title-banner { padding: 60px 30px; }
    }
    @media (max-width: 600px) {
        .gallery-grid { grid-template-columns: 1fr; gap: 15px; } 
    }
</style>
</head>
