<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSO - OVIEDO | UNAILOFOTOS</title>
    
    <!-- Fuentes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- LightGallery CSS -->
    <link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
    
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --rso-blue: #004cba;
            --dark-bg: #030305;
            --darker-bg: #000000;
            --pure-white: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark-bg);
            color: var(--pure-white);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 20px 4vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(3, 3, 5, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--pure-white);
            text-decoration: none;
            letter-spacing: 2px;
        }

        /* Hero Banner */
        .title-banner {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0, 95, 184, 0.2), var(--dark-bg)), url('oviedo.jpg');
            background-size: cover;
            background-position: center;
            padding: 0 4vw;
            margin-bottom: 60px;
        }

        .title-banner h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 10vw, 8rem);
            line-height: 0.9;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .title-banner p {
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Galería Masonry */
        .gallery-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 4vw;
        }

        .gallery-masonry {
            columns: 3;
            column-gap: 20px;
        }

        .gallery-masonry a {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--darker-bg);
            transition: transform 0.4s ease;
        }

        .gallery-masonry img {
            width: 100%;
            display: block;
            transition: filter 0.4s ease;
        }

        .gallery-masonry a:hover {
            transform: translateY(-5px);
        }

        /* Botones de Navegación */
        .nav-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 100px 4vw;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-radius: 50px;
            text-align: center;
            min-width: 200px;
        }

        .btn-home {
            border: 1px solid var(--text-muted);
            color: var(--pure-white);
        }

        .btn-home:hover {
            background: var(--pure-white);
            color: var(--darker-bg);
            border-color: var(--pure-white);
            transform: scale(1.05);
        }

        @media (max-width: 900px) {
            .gallery-masonry { columns: 2; }
        }

        @media (max-width: 600px) {
            .gallery-masonry { columns: 1; }
            .title-banner { height: 50vh; }
        }
    </style>
</head>

<body>

    <nav>
        <a href="../../index.html" class="logo">UNAILOFOTOS</a>
    </nav>

    <div class="title-banner">
        <h1 data-aos="fade-up">RSO - OVIEDO</h1>
        <p data-aos="fade-up" data-aos-delay="200">Temporada 25/26</p>
    </div>

    <div class="gallery-container">
        <div id="lightgallery" class="gallery-masonry">
            <a href="ULF_8353.jpg" data-aos="fade-up"><img src="ULF_8353.jpg" loading="lazy"></a>

            <a href="ULF_8369.jpg" data-aos="fade-up"><img src="ULF_8369.jpg" loading="lazy"></a>
            <a href="ULF_8370.jpg" data-aos="fade-up"><img src="ULF_8370.jpg" loading="lazy"></a>
            <a href="ULF_8373.jpg" data-aos="fade-up"><img src="ULF_8373.jpg" loading="lazy"></a>

            <a href="ULF_8375.jpg" data-aos="fade-up"><img src="ULF_8375.jpg" loading="lazy"></a>
            <a href="ULF_8412.jpg" data-aos="fade-up"><img src="ULF_8412.jpg" loading="lazy"></a>
            <a href="ULF_8417.jpg" data-aos="fade-up"><img src="ULF_8417.jpg" loading="lazy"></a>
            <a href="ULF_8431.jpg" data-aos="fade-up"><img src="ULF_8431.jpg" loading="lazy"></a>
            <a href="ULF_8434.jpg" data-aos="fade-up"><img src="ULF_8434.jpg" loading="lazy"></a>
            <a href="ULF_8451.jpg" data-aos="fade-up"><img src="ULF_8451.jpg" loading="lazy"></a>

    <div class="nav-buttons">
        <a href="../../index.html" class="btn btn-home">VOLVER AL INICIO</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/lightgallery.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
