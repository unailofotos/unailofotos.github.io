<style>
    :root { --rso-blue: #002d72; --pure-white: #ffffff; --neon: #00d4ff; }
    body { 
        background: linear-gradient(135deg, var(--pure-white) 0%, var(--pure-white) 50%, var(--rso-blue) 50%, var(--rso-blue) 100%);
        background-attachment: fixed;
        margin: 0; font-family: 'Montserrat', sans-serif; color: #000;
    }
    .title-banner { height: 50vh; display: flex; align-items: flex-end; padding: 60px; background: linear-gradient(to bottom, var(--rso-blue), transparent); border-bottom: 5px solid var(--pure-white); position: relative; }
    .title-banner h1 { font-family: 'Bebas Neue'; font-size: clamp(60px, 12vw, 140px); margin: 0; color: var(--pure-white); text-shadow: 0 10px 30px rgba(0,0,0,0.4); z-index: 5; }
    .gallery-cascada { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; padding: 20px; }
    .gallery-cascada a { overflow: hidden; height: 500px; border: 4px solid var(--pure-white); border-radius: 4px; position: relative; transition: 0.4s; }
    .gallery-cascada img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.4); transition: 1s; }
    .gallery-cascada a:hover { border-color: var(--neon); transform: translateY(-5px); }
    .gallery-cascada a:hover img { filter: grayscale(0) brightness(1.1); transform: scale(1.05); }
    .gallery-cascada a::before { content: "VER FOTO"; position: absolute; inset: 0; background: rgba(0, 45, 114, 0.6); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 2rem; color: #fff; opacity: 0; transition: 0.3s; z-index: 10; }
    .footer-nav { text-align: center; padding: 80px 20px; }
    .btn-exit { display: inline-block; padding: 15px 50px; background: var(--pure-white); border: 2px solid var(--rso-blue); color: var(--rso-blue); text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 3px; transition: 0.3s; }
    .btn-exit:hover { background: var(--rso-blue); color: #fff; }
</style>
