    body { background: #020205; color: white; font-family: 'Montserrat'; margin: 0; overflow-x: hidden; }

    .gallery-cascada img { width: 100%; height: 100%; object-fit: cover; transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1); filter: brightness(0.7); }
    
    .gallery-cascada a:hover img { transform: scale(1.1); filter: brightness(1.1); }
    .gallery-cascada a::after { content: "ZOOM +"; position: absolute; inset: 0; background: rgba(0, 45, 114, 0.4); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 2.5rem; opacity: 0; transition: 0.4s; z-index: 10; letter-spacing: 5px; }
    .gallery-cascada a:hover::after { opacity: 1; }

    .footer-nav { text-align: center; padding: 100px 20px; background: linear-gradient(to top, #002d72, transparent); }
    .btn-exit { display: inline-block; padding: 20px 60px; background: transparent; border: 2px solid #ffffff; color: #ffffff; text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 5px; transition: 0.4s; position: relative; }
