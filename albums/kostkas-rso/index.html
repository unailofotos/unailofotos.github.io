<style>
body{
    font-family: Arial;
    margin:0;
    background:white;
    color:#222;
}

header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    margin:0;
    font-size:30px;
}

header p{
    color:#666;
}

section{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* COLLAGE ALBUM */
.collage{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
}

.collage img{
    width:100%;
    height:auto;  /* mantiene proporción original */
    border-radius:6px;
    cursor:pointer;
    transition:0.25s;
}

.collage img:hover{
    transform:scale(1.03);
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    border-top:1px solid #eee;
}

footer a{
    text-decoration:none;
    color:#222;
    margin:0 10px;
}
</style>
</head>
