<style>
    :root {
        --bg-color: #050505;
        --accent-blue: #007bff;
        --text-color: #ffffff;
        --secondary-text: #888888;
    }

    body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        background: var(--bg-color);
        color: var(--text-color);
    }

    header {
        text-align: center;
        padding: 80px 20px 50px;
        background: radial-gradient(circle at top, #1a1a3a 0%, var(--bg-color) 70%);
    }

    header h1 {
        font-family: 'Mulish', sans-serif;
        font-size: clamp(30px, 6vw, 50px);
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 8px;
        color: var(--text-color);
    }

    .gallery {
        column-gap: 20px;
        padding: 0 30px;
        max-width: 1400px;
        margin: auto;
    }

    @media (min-width: 1024px) { .gallery { column-count: 4; } }
    @media (max-width: 1023px) and (min-width: 768px) { .gallery { column-count: 3; } }
    @media (max-width: 767px) { .gallery { column-count: 2; } }

    .gallery a {
        display: block;
        margin-bottom: 20px;
        overflow: hidden;
        border-radius: 12px;
        background: #111;
        border: 1px solid #222;
        transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .gallery img {
        width: 100%;
        display: block;
        transition: 0.5s;
        filter: brightness(0.8) grayscale(20%);
    }

    .gallery a:hover {
        transform: translateY(-8px);
        border-color: var(--accent-blue);
        box-shadow: 0 10px 30px rgba(0, 123, 255, 0.2);
    }

    .gallery a:hover img {
        filter: brightness(1.1) grayscale(0%);
        transform: scale(1.03);
    }

    .back-container {
        text-align: center;
        margin: 80px 0 100px;
    }

    .back-link {
        text-decoration: none;
        color: var(--text-color);
        font-weight: 600;
        font-size: 0.8rem;
        letter-spacing: 3px;
        padding: 15px 35px;
        border: 1px solid #333;
        border-radius: 50px;
        transition: 0.3s;
        display: inline-block;
        text-transform: uppercase;
    }

    .back-link:hover {
        background: var(--accent-blue);
        border-color: var(--accent-blue);
        box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
    }
</style>
