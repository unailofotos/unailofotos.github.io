    /* Estilos idénticos para coherencia */
    :root { --rso-blue: #0067b1; --dark: #050505; }
    body { background: var(--dark); color: white; font-family: 'Inter'; margin: 0; }
    .header-album { padding: 120px 20px; text-align: center; background: repeating-linear-gradient(45deg, #004d85, #004d85 10px, var(--rso-blue) 10px, var(--rso-blue) 20px); border-bottom: 8px solid white; }

    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 40px; max-width: 1400px; margin: auto; }
    .gallery a { overflow: hidden; border: 1px solid #222; aspect-ratio: 3/4; background: #111; transition: 0.4s; }
    .gallery a img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); transition: 0.6s; }
    .gallery a:hover { transform: scale(0.98); border-color: var(--rso-blue); }
    .gallery a:hover img { filter: brightness(1.1); transform: scale(1.05); }
    .btn-back { display: block; width: fit-content; margin: 60px auto 100px; padding: 18px 50px; background: white; color: var(--rso-blue); text-decoration: none; font-weight: 900; text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s; }
    .btn-back:hover { background: var(--rso-blue); color: white; }
