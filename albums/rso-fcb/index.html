<style>
    :root {
        --bg-color: #0a0a0a;
        --text-color: #ffffff;
        --accent-color: #e63946;
        --secondary-text: #a0a0a0;
    }

    body {
        font-family: 'Cabin', Arial, sans-serif;
        margin: 0;
        background: var(--bg-color);
        color: var(--text-color);
    }

    header {
        text-align: center;
        padding: 60px 20px 40px;
    }

    header h1 {
        font-family: 'Lobster', cursive;
        font-size: 3rem;
        margin: 0;
        color: var(--text-color);
        text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
    }

    /* GALERÍA MASONRY RESPONSIVA */
    .gallery {
        column-gap: 15px;
        padding: 20px;
        max-width: 1200px;
        margin: auto;
    }

    @media (min-width: 1024px) { .gallery { column-count: 4; } }
    @media (max-width: 1023px) and (min-width: 768px) { .gallery { column-count: 3; } }
    @media (max-width: 767px) { .gallery { column-count: 2; } }

    .gallery a {
        display: block;
        margin-bottom: 15px;
        overflow: hidden;
        border-radius: 8px;
        background: #1a1a1a;
    }

    .gallery img {
        width: 100%;
        display: block;
        transition: transform 0.4s ease, filter 0.4s ease;
        filter: brightness(0.85);
    }

    .gallery img:hover {
        transform: scale(1.05);
        filter: brightness(1.1);
    }

    /* BOTÓN VOLVER */
    .back-container {
        text-align: center;
        margin: 50px 0 80px;
    }

    .back-link {
        text-decoration: none;
        color: var(--text-color);
        font-weight: 600;
        padding: 12px 25px;
        border: 1px solid #333;
        border-radius: 30px;
        transition: 0.3s;
        display: inline-block;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 0.85rem;
    }

    .back-link:hover {
        background: var(--text-color);
        color: var(--bg-color);
        border-color: var(--text-color);
    }
</style>
