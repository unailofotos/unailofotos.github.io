<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<style>
    :root { --blue: #002d72; --neon: #00d4ff; --white: #ffffff; --dark: #020205; }
    body { background: var(--dark); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }

    /* Fondo dinámico */
    .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .hero-title { z-index: 10; text-align: center; }
    .hero-title h1 { font-family: 'Bebas Neue', cursive; font-size: clamp(80px, 20vw, 220px); line-height: 0.8; margin: 0; letter-spacing: -5px; color: transparent; -webkit-text-stroke: 2px var(--white); transition: 0.5s; }
    .hero-title h1:hover { color: var(--white); -webkit-text-stroke: 2px var(--blue); }

    /* Galería Flotante */
    .floating-gallery { padding: 100px 50px; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; position: relative; }
    .floating-gallery a { position: relative; display: block; transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
    .floating-gallery img { width: 300px; height: 400px; object-fit: cover; border-radius: 2px; filter: saturate(0.5) brightness(0.8); transition: 0.5s; }
    
    /* Efecto Inovador: Rotación aleatoria */
    .floating-gallery a:nth-child(even) { transform: rotate(3deg) translateY(20px); }
    .floating-gallery a:nth-child(odd) { transform: rotate(-3deg) translateY(-20px); }
    
    .floating-gallery a:hover { transform: rotate(0deg) scale(1.1) z-index: 20; }
    .floating-gallery a:hover img { filter: saturate(1) brightness(1); box-shadow: 0 30px 60px rgba(0,212,255,0.3); }

    /* Sección Álbumes tipo "Ticket" */
    .album-section { padding: 100px 20px; text-align: center; }
    .album-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; max-width: 1200px; margin: auto; }
    .ticket-album { position: relative; background: var(--blue); padding: 10px; text-decoration: none; color: white; border-radius: 10px; overflow: hidden; transition: 0.4s; clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 85% 0%, 85% 15%, 100% 15%, 100% 85%, 85% 85%, 85% 100%, 15% 100%, 15% 85%, 0% 85%); }
    .ticket-album:hover { transform: translateY(-15px); background: var(--neon); }
    .ticket-album img { width: 100%; height: 250px; object-fit: cover; opacity: 0.8; }
    .ticket-info { padding: 25px; font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 2px; }

    footer { padding: 80px 20px; background: #000; text-align: center; border-top: 1px solid #1a1a1a; }
    .socials a { color: var(--white); text-decoration: none; margin: 0 15px; font-size: 0.8rem; letter-spacing: 4px; font-weight: 800; transition: 0.3s; }
    .socials a:hover { color: var(--neon); }
</style>
