<style>
body{
font-family:Arial;
margin:0;
background:white;
color:#222;

header{
text-align:center;
padding:50px 20px;

margin:0;

}

header p{
color:#666;
}

section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* COLLAGE */

.collage{
display:grid;
grid-template-columns: repeat(5,1fr);
gap:10px;
margin-top:30px;
}

.collage img{
width:100%;
height:auto;
border-radius:6px;
transition:0.25s;
cursor:pointer;
}

.collage img:hover{
transform:scale(1.03);
}

/* tamaños distintos */
.big{ grid-column: span 2; }
.wide{ grid-column: span 2; }
.tall{ grid-row: span 2; }

footer{
text-align:center;
padding:40px;
border-top:1px solid #eee;
}

footer a{
margin:0 10px;
text-decoration:none;
color:#222;
}
</style>
</head>
