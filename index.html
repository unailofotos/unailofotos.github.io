<style>
    :root { 
        --rso-blue: #002d72; 
        --pure-white: #ffffff; 
        --neon: #00d4ff; 
    }

    body { 
        background: linear-gradient(135deg, var(--pure-white) 0%, var(--pure-white) 50%, var(--rso-blue) 50%, var(--rso-blue) 100%);
        background-attachment: fixed;
        margin: 0; 
        font-family: 'Montserrat', sans-serif; 
        color: #000;
        overflow-x: hidden;
    }

    /* Banner con Título Centrado */
    .title-banner { 
        height: 50vh; 
        display: flex; 
        flex-direction: column;
        justify-content: center; 
        align-items: center; 
        padding: 40px 20px; 
        background: linear-gradient(to bottom, rgba(0,45,114,0.4), transparent); 
        text-align: center;
        position: relative; 
    }

    .title-banner h1 { 
        font-family: 'Bebas Neue'; 
        font-size: clamp(60px, 15vw, 150px); 
        margin: 0; 
        color: var(--pure-white); 
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 45, 114, 0.2);
        z-index: 5;
        letter-spacing: 4px;
        line-height: 1;
    }

    .gallery-container {
        max-width: 1600px;
        margin: auto;
        padding: 40px 20px;
    }

    /* Galería Principal 5x3 */
    .gallery-main { 
        display: grid; 
        grid-template-columns: repeat(5, 1fr);
        gap: 15px; 
    }

    .gallery-main a { 
        position: relative;
        overflow: hidden; 
        height: 450px; 
        background: var(--pure-white);
        border-radius: 4px; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        will-change: transform;
    }

    .gallery-main img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        transition: 0.6s ease;
        display: block;
    }

    .gallery-main a:hover { 
        transform: translateY(-8px); 
        box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        z-index: 10;
    }
    
    .gallery-main a:hover img { transform: scale(1.05); }

    .gallery-main a::after { 
        content: "AMPLIAR"; 
        position: absolute; 
        bottom: 20px; 
        left: 20px;
        background: var(--rso-blue);
        color: white;
        padding: 5px 15px;
        font-family: 'Bebas Neue';
        font-size: 1.2rem;
        opacity: 0;
        transform: translateY(10px);
        transition: 0.3s;
    }
    .gallery-main a:hover::after { opacity: 1; transform: translateY(0); }

    /* Sección de Álbumes */
    .album-header {
        font-family: 'Bebas Neue';
        font-size: 4rem;
        text-align: center;
        color: var(--pure-white);
        margin-top: 80px;
        text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    .album-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
        gap: 40px; 
        max-width: 1200px; 
        margin: 40px auto 100px;
        padding: 0 20px;
    }
    
    .square-album { 
        background: var(--pure-white); 
        padding: 12px; 
        text-decoration: none; 
        aspect-ratio: 1 / 1;
        display: flex;
        flex-direction: column;
        transition: 0.4s ease;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    
    .square-album img { width: 100%; height: 100%; object-fit: cover; }
    
    .square-album .info { 
        font-family: 'Bebas Neue'; 
        font-size: 2rem; 
        color: var(--rso-blue); 
        padding: 20px 0 10px; 
        text-align: center;
        letter-spacing: 1px;
    }
    
    .square-album:hover { transform: scale(1.05); background: var(--rso-blue); }
    .square-album:hover .info { color: var(--pure-white); }

    footer { text-align: center; padding: 100px 20px; color: var(--pure-white); }
    .socials a { color: var(--pure-white); text-decoration: none; margin: 0 20px; font-weight: 900; letter-spacing: 2px; }
    .socials a:hover { color: var(--neon); }
    
    .email-link {
        display: inline-block;
        margin-top: 25px;
        color: var(--pure-white);
        text-decoration: none;
        font-family: 'Montserrat';
        font-weight: 300;
        font-size: 1rem;
        letter-spacing: 1px;
        opacity: 0.8;
        transition: 0.3s;
    }
    .email-link:hover { opacity: 1; color: var(--neon); }

    /* Responsive */
    @media (max-width: 1200px) { .gallery-main { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { 
        .gallery-main { grid-template-columns: repeat(1, 1fr); } 
        .title-banner { height: 40vh; }
        .title-banner h1 { font-size: 80px; }
    }
</style>
