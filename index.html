<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNAILOFOTOS | Fotografía deportiva</title>

<link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600&family=Lobster&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">

<style>
    :root {
        --bg-color: #0a0a0a;
        --text-color: #ffffff;
        --accent-color: #e63946;
        --secondary-text: #a0a0a0;
    }

    body {
        font-family: 'Cabin', Arial, sans-serif;
        margin: 0;
        background: var(--bg-color);
        color: var(--text-color);
        line-height: 1.6;
    }

    header {
        text-align: center;
        padding: 80px 20px 60px 20px;
        background: linear-gradient(to bottom, #1a1a1a, var(--bg-color));
    }

    header h1 {
        font-family: 'Lobster', cursive;
        font-size: clamp(50px, 8vw, 80px);
        margin-bottom: 10px;
        letter-spacing: 2px;
        text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
    }

    header p {
        font-size: 1.2rem;
        color: var(--secondary-text);
        max-width: 600px;
        margin: 0 auto;
        font-style: italic;
    }

    .gallery {
        column-gap: 15px;
        padding: 20px;
        max-width: 1400px;
        margin: auto;
    }

    @media (min-width: 1024px) { .gallery { column-count: 5; } }
    @media (max-width: 1023px) and (min-width: 768px) { .gallery { column-count: 3; } }
    @media (max-width: 767px) { .gallery { column-count: 2; } }

    .gallery a {
        display: block;
        margin-bottom: 15px;
        overflow: hidden;
        border-radius: 8px;
        background: #1a1a1a;
    }

    .gallery img {
        width: 100%;
        display: block;
        transition: transform 0.5s ease, filter 0.5s ease;
        filter: brightness(0.9);
    }

    .gallery img:hover {
        transform: scale(1.08);
        filter: brightness(1.1);
    }

    .section-title {
        text-align: center;
        font-size: 2.5rem;
        font-weight: 600;
        margin: 60px 0 30px;
        text-transform: uppercase;
        letter-spacing: 3px;
    }

    .albums {
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 40px 20px;
        flex-wrap: wrap;
    }

    .album {
        text-decoration: none;
        color: var(--text-color);
        background: #161616;
        padding: 15px;
        border-radius: 12px;
        transition: 0.3s;
        border: 1px solid #222;
        max-width: 250px;
    }

    .album:hover {
        background: #222;
        border-color: var(--accent-color);
        transform: translateY(-10px);
    }

    .album img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 8px;
    }

    .album p {
        font-size: 1.3rem;
        font-weight: 600;
        margin: 15px 0 5px;
        text-align: center;
    }

    footer {
        text-align: center;
        padding: 60px 20px;
        background: #050505;
        border-top: 1px solid #1a1a1a;
        margin-top: 50px;
    }

    footer p {
        color: var(--secondary-text);
        margin-bottom: 20px;
    }

    footer a {
        color: var(--text-color);
        text-decoration: none;
        margin: 0 15px;
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.3s;
        opacity: 0.7;
    }

    footer a:hover {
        color: var(--accent-color);
        opacity: 1;
    }
</style>
</head>
