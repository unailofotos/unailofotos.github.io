<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNAILOFOTOS | Fotografía Deportiva</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<style>
    :root { --rso-blue: #002d72; --pure-white: #ffffff; --neon: #00d4ff; }
    body { background: #f8f8f8; margin: 0; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

    /* Hero Section con Parallax */
    .title-banner { 
        height: 70vh; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        background: linear-gradient(rgba(0,45,114,0.6), rgba(0,45,114,0.6)), url('fotos_main/DSC_5304.jpg'); 
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        text-align: center;
        position: relative; 
    }
    .title-banner h1 { 
        font-family: 'Bebas Neue'; 
        font-size: clamp(60px, 15vw, 150px); 
        color: var(--pure-white); 
        text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        letter-spacing: 5px;
    }

    /* Galería Estilo Masonry (Más pro) */
    .gallery-container { max-width: 1400px; margin: -50px auto 40px; padding: 0 20px; position: relative; z-index: 10; }
    .gallery-main { columns: 3; column-gap: 20px; }
    .gallery-main a { 
        display: inline-block; width: 100%; margin-bottom: 20px;
        border-radius: 8px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        transition: 0.4s; background: white;
    }
    .gallery-main img { width: 100%; display: block; transition: 0.5s; }
    .gallery-main a:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .gallery-main a:hover img { transform: scale(1.03); }

    /* Álbumes */
    .album-header { font-family: 'Bebas Neue'; font-size: 4rem; text-align: center; color: var(--rso-blue); margin-top: 80px; }
    .album-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 40px auto 100px; padding: 0 20px; }
    .square-album { background: white; padding: 10px; text-decoration: none; transition: 0.4s; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 4px; }
    .square-album img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    .square-album .info { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--rso-blue); padding: 15px 0; text-align: center; }
    .square-album:hover { transform: scale(1.05); background: var(--rso-blue); }
    .square-album:hover .info { color: white; }

    footer { background: var(--rso-blue); padding: 80px 20px; text-align: center; color: white; }
    .socials a { color: white; text-decoration: none; margin: 0 15px; font-weight: 900; letter-spacing: 2px; transition: 0.3s; }
    .socials a:hover { color: var(--neon); }

    @media (max-width: 900px) { .gallery-main { columns: 2; } }
    @media (max-width: 600px) { .gallery-main { columns: 1; } .title-banner { height: 50vh; } }
</style>
</head>
