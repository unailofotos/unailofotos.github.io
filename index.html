<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNAILOFOTOS | Fotografía Deportiva</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<style>
:root { 
    --rso-blue: #002d72; 
    --dark-bg: #0a0a0a;
    --light-bg: #fcfcfc;
    --pure-white: #ffffff; 
    --neon: #00d4ff; 
    --text-main: #1a1a1a;
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body { 
    background: var(--light-bg); 
    margin: 0; 
    font-family: 'Montserrat', sans-serif; 
    color: var(--text-main);
    overflow-x: hidden; 
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* Hero Section */
.title-banner { 
    height: 75vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background: linear-gradient(to bottom, rgba(0, 20, 50, 0.4), rgba(0, 45, 114, 0.8)), url('fotos_main/DSC_5304.jpg'); 
    background-size: cover;
    background-position: center;
    background-attachment: scroll; /* cambio para evitar lag */
    text-align: center;
    position: relative; 
}

.title-banner::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 150px;
    background: linear-gradient(to bottom, transparent, var(--light-bg));
}

.title-banner h1 { 
    font-family: 'Bebas Neue', sans-serif; 
    font-size: clamp(4rem, 12vw, 9rem); 
    color: var(--pure-white); 
    letter-spacing: 0.1em;
    margin: 0;
    text-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* Galería Estilo Masonry Minimalista */
.gallery-container { 
    max-width: 1600px; 
    margin: -60px auto 80px; 
    padding: 0 4vw; 
    position: relative; 
}

.gallery-main { 
    columns: 3; 
    column-gap: 25px; 
}

.gallery-main a { 
    display: block; 
    margin-bottom: 25px;
    border-radius: 4px; 
    overflow: hidden; 
    background: #eee;
    break-inside: avoid;
    transform: translateZ(0);
}

.gallery-main img { 
    width: 100%; 
    display: block; 
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
    will-change: transform;
}

.gallery-main a:hover img { 
    transform: scale(1.04); 
}

/* Sección Álbumes Premium */
.album-section {
    max-width: 1400px;
    margin: 0 auto 120px;
    padding: 0 4vw;
}

.album-header { 
    font-family: 'Bebas Neue', sans-serif; 
    font-size: clamp(3rem, 6vw, 5rem); 
    text-align: center; 
    color: var(--rso-blue); 
    margin: 0 0 60px 0; 
    letter-spacing: 0.05em;
}

.album-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
    gap: 40px; 
}

.square-album { 
    position: relative;
    display: block;
    text-decoration: none; 
    border-radius: 6px; 
    overflow: hidden;
    aspect-ratio: 1/1;
    background: var(--dark-bg);
    transform: translateZ(0);
}

.square-album img { 
    width: 100%; 
    height: 100%;
    object-fit: cover; 
    transition: transform 0.8s ease, opacity 0.4s ease;
    opacity: 0.85;
    will-change: transform;
}

.square-album::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0, 45, 114, 0.95) 0%, transparent 60%);
    z-index: 1;
    opacity: 0.7;
    transition: opacity 0.4s ease;
}

.square-album .info { 
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    font-family: 'Bebas Neue', sans-serif; 
    font-size: 2.5rem; 
    color: var(--pure-white); 
    padding: 40px 30px; 
    text-align: left; 
    z-index: 2;
    letter-spacing: 2px;
    transition: transform 0.4s ease, color 0.4s ease;
}

.square-album:hover img { 
    transform: scale(1.05); 
    opacity: 0.5;
}

.square-album:hover::before {
    opacity: 1;
}

.square-album:hover .info { 
    transform: translateY(-10px);
    color: var(--neon);
}

/* Footer Elegante */
footer { 
    background: var(--dark-bg); 
    padding: 100px 20px 60px; 
    text-align: center; 
    color: var(--pure-white); 
}

.socials {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 40px;
}

.socials a { 
    color: var(--pure-white); 
    text-decoration: none; 
    font-family: 'Montserrat', sans-serif;
    font-size: 0.85rem;
    font-weight: 600; 
    letter-spacing: 3px; 
    transition: color 0.3s ease, transform 0.3s ease; 
    display: inline-block;
}

.socials a:hover { 
    color: var(--neon); 
    transform: translateY(-3px);
}

.footer-email {
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    color: var(--pure-white); 
    text-decoration: none; 
    opacity: 0.6;
    transition: opacity 0.3s ease;
    letter-spacing: 1px;
}

.footer-email:hover {
    opacity: 1;
}

.copyright {
    margin-top: 60px; 
    opacity: 0.3; 
    font-size: 0.75rem; 
    letter-spacing: 2px;
    font-weight: 300;
}

/* Responsive */
@media (max-width: 1024px) { 
    .gallery-main { columns: 2; } 
}

@media (max-width: 600px) { 
    .gallery-main { columns: 1; } 
    .title-banner { height: 60vh; } 
    .socials { gap: 20px; flex-wrap: wrap; }
    .album-grid { gap: 20px; }
    .square-album .info { font-size: 2rem; padding: 25px 20px; text-align: center; }
}
</style>
</head>
