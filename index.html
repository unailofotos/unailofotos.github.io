<style>
    :root {
        --bg-color: #050505;
        --accent-blue: #007bff;
        --pure-white: #ffffff;
        --soft-gray: #888888;
        --card-bg: #111111;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        background-color: var(--bg-color);
        color: var(--pure-white);
        line-height: 1.6;
        overflow-x: hidden;
    }

    /* Animación de entrada suave */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* HEADER CON FUENTE MULI */
    header {
        text-align: center;
        padding: 120px 20px 80px;
        background: radial-gradient(circle at top, #1a1a3a 0%, var(--bg-color) 85%);
    }

    header h1 {
        font-family: 'Mulish', sans-serif;
        font-size: clamp(40px, 12vw, 95px);
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 12px; /* Espaciado pro */
        font-weight: 800;
        background: linear-gradient(to bottom, #ffffff, #888888);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: fadeIn 0.8s ease-out;
    }

    header p {
        font-size: 0.9rem;
        color: var(--soft-gray);
        max-width: 600px;
        margin: 20px auto 0;
        letter-spacing: 5px;
        text-transform: uppercase;
        font-weight: 300;
        animation: fadeIn 1.2s ease-out;
    }

    /* GALERÍA MASONRY PORTADA */
    .gallery {
        column-gap: 20px;
        padding: 0 40px;
        max-width: 1600px;
        margin: auto;
    }

    @media (min-width: 1024px) { .gallery { column-count: 5; } }
    @media (max-width: 1023px) and (min-width: 768px) { .gallery { column-count: 3; } }
    @media (max-width: 767px) { .gallery { column-count: 2; } }

    .gallery a {
        display: block;
        margin-bottom: 20px;
        overflow: hidden;
        border-radius: 15px;
        background: var(--card-bg);
        transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        border: 1px solid #1a1a1a;
        animation: fadeIn 1s ease-out both;
    }

    .gallery img {
        width: 100%;
        display: block;
        transition: 0.6s;
        filter: brightness(0.7) grayscale(30%);
    }

    .gallery a:hover {
        transform: scale(1.03) translateY(-10px);
        border-color: var(--accent-blue);
        box-shadow: 0 20px 40px rgba(0, 123, 255, 0.25);
        z-index: 10;
    }

    .gallery a:hover img {
        filter: brightness(1.1) grayscale(0%);
    }

    /* SECCIÓN ÁLBUMES */
    .section-title {
        text-align: center;
        font-size: 0.8rem;
        font-weight: 700;
        margin: 120px 0 50px;
        text-transform: uppercase;
        letter-spacing: 8px;
        color: var(--accent-blue);
    }

    .albums {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 35px;
        padding: 0 40px 120px;
        max-width: 1300px;
        margin: auto;
    }

    .album {
        position: relative;
        text-decoration: none;
        color: white;
        border-radius: 20px;
        overflow: hidden;
        aspect-ratio: 1 / 1;
        transition: 0.5s;
        border: 1px solid #222;
    }

    .album img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.8s;
    }

    .album-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 30px;
        transition: 0.4s;
    }

    .album p {
        font-family: 'Mulish', sans-serif;
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .album:hover {
        border-color: var(--pure-white);
        transform: translateY(-5px);
    }

    .album:hover img {
        transform: scale(1.1);
    }

    .album:hover .album-overlay {
        background: rgba(0, 123, 255, 0.3);
    }

    /* FOOTER */
    footer {
        text-align: center;
        padding: 100px 20px;
        background: #000;
        border-top: 1px solid #111;
    }

    .social-links {
        margin-bottom: 30px;
    }

    .social-links a {
        color: var(--pure-white);
        text-decoration: none;
        margin: 0 20px;
        font-weight: 700;
        font-size: 0.75rem;
        letter-spacing: 3px;
        transition: 0.3s;
        opacity: 0.4;
    }

    .social-links a:hover {
        opacity: 1;
        color: var(--accent-blue);
    }

    footer p {
        color: #333;
        font-size: 0.7rem;
        letter-spacing: 2px;
    }

</style>
</head>
