<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<style>
    :root { 
        --rso-blue: #002d72; 
        --neon-blue: #00d4ff; 
        --pure-white: #ffffff; 
        --text-dark: #020205; 
    }

    /* MANTENIDO: Fondo original */
    body { 
        background: linear-gradient(135deg, var(--pure-white) 0%, var(--pure-white) 50%, var(--rso-blue) 50%, var(--rso-blue) 100%);
        background-attachment: fixed;
        color: var(--text-dark); 
        font-family: 'Montserrat', sans-serif; 
        margin: 0; 
        overflow-x: hidden; 
    }

    /* MANTENIDO: Hero y Título original */
    .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
    .hero-title { z-index: 10; text-align: center; }
    .hero-title h1 { 
        font-family: 'Bebas Neue', cursive; 
        font-size: clamp(80px, 20vw, 220px); 
        line-height: 0.8; 
        margin: 0; 
        letter-spacing: -5px; 
        color: transparent; 
        -webkit-text-stroke: 2px var(--rso-blue); 
        transition: 0.5s; 
    }
    .hero-title h1:hover { color: var(--pure-white); -webkit-text-stroke: 2px var(--neon-blue); }

    /* NUEVO: Galería optimizada (Adiós a los tirones) */
    .floating-gallery { 
        padding: 50px 20px; 
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        max-width: 1400px;
        margin: auto;
    }
    
    .floating-gallery a { 
        position: relative; 
        display: block; 
        overflow: hidden;
        border-radius: 2px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        background: var(--pure-white);
        padding: 10px; /* Estilo marco de foto física */
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        will-change: transform; /* Optimización para scroll fluido */
    }

    .floating-gallery img { 
        width: 100%; 
        height: 400px; 
        object-fit: cover; 
        display: block;
        filter: grayscale(0.3);
        transition: 0.5s ease;
    }

    .floating-gallery a:hover { 
        transform: translateY(-10px) scale(1.02); 
        z-index: 20; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    
    .floating-gallery a:hover img { 
        filter: grayscale(0) saturate(1.2); 
    }

    /* NUEVA SECCIÓN ÁLBUMES: Estilo "Ticket Deportivo" */
    .album-section { padding: 100px 20px; }
    .album-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
        gap: 40px; 
        max-width: 1200px; 
        margin: auto; 
    }
    
    .square-album { 
        position: relative; 
        background: var(--pure-white); 
        text-decoration: none; 
        color: var(--rso-blue); 
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        border-left: 8px solid var(--rso-blue); /* Detalle Real Sociedad */
    }

    .square-album img { 
        width: 100%; 
        aspect-ratio: 16/9; 
        object-fit: cover; 
    }

    .ticket-info { 
        padding: 20px; 
        font-family: 'Bebas Neue'; 
        font-size: 2rem; 
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .ticket-info::after {
        content: "→";
        font-size: 1.5rem;
        color: var(--neon-blue);
    }

    .square-album:hover { 
        background: var(--rso-blue);
        color: var(--pure-white);
        transform: translateX(10px);
    }

    footer { padding: 80px 20px; background: var(--rso-blue); text-align: center; border-top: 5px solid var(--pure-white); color: white;}
    .socials a { color: var(--pure-white); text-decoration: none; margin: 0 15px; font-size: 0.8rem; letter-spacing: 4px; font-weight: 800; transition: 0.3s; opacity: 0.7; }
    .socials a:hover { color: var(--neon-blue); opacity: 1; }
    footer p { margin-top: 40px; color: rgba(255,255,255,0.5); font-size: 0.75rem; }
</style>
</head>
