<style>
body{
    font-family: 'Cabin', Arial, sans-serif;
    margin:0;
    background:white;
    color:#111;
}

header{
    text-align:center;
    padding:60px 20px 40px 20px;
}

header h1{
    font-family: 'Lobster', cursive;
    font-size:60px;  /* más grande */
    font-weight:bold;
    margin-bottom:10px;
    color:#222;
}

header p{
    font-family: 'Cabin', sans-serif;
    font-size:20px;  /* más pequeño que el título */
    font-weight:400;
    color:#555;
    max-width:700px;
    margin:0 auto;
}

/* COLLAGE PRINCIPAL */
.gallery{
    column-count:5;
    column-gap:10px;
    padding:30px;
    max-width:1400px;
    margin:auto;
}

.gallery img{
    width:100%;
    margin-bottom:10px;
    border-radius:6px;
    cursor:pointer;
}

/* SECCIÓN ÁLBUMES */
.albums{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:40px;
    flex-wrap:wrap;
}

.album{
    text-align:center;
    text-decoration:none;
    color:#111;
}

.album img{
    width:220px;
    border-radius:6px;
    transition:0.2s;
}

.album img:hover{
    transform:scale(1.05);
}

/* TÍTULOS DE ÁLBUMES MÁS GRANDES */
.album p {
    font-size: 20px;      /* tamaño más grande */
    font-weight: 600;     /* negrita */
    margin-top: 10px;     /* separación de la imagen */
    color: #222;
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    color:#555;
    font-size:14px;
}

footer a{
    color:#000;
    text-decoration:none;
    margin:0 8px;
}
</style>
</head>
