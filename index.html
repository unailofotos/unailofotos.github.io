<style>
body{
    font-family:Arial;
    margin:0;
    background:white;
    color:#222;

header{
    text-align:center;
    padding:50px 20px;
}

header h1{

    font-size:34px;
}

header p{
    color:#666;

section{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

/* COLLAGE PRINCIPAL */
.collage{
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:10px;
    margin-top:30px;
}

.collage img{
    width:100%;
    height:auto;  /* mantiene proporción original */
    border-radius:6px;
    cursor:pointer;
    transition:0.25s;
}

.collage img:hover{
    transform:scale(1.03);
}

/* tamaños distintos */
.big{ grid-column: span 2; }
.wide{ grid-column: span 2; }
.tall{ grid-row: span 2; }

/* MINIATURA DEL ALBUM */
.albums{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-top:40px;
}

.album{
    text-align:center;
    text-decoration:none;
    color:#222;
}

.album-cover{
    width:200px;        /* ancho máximo de portada */
    height:auto;        /* mantiene proporción */
    border-radius:6px;
    transition:0.25s;
}

.album-cover:hover{
    transform:scale(1.05);
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    border-top:1px solid #eee;
}

footer a{
    margin:0 10px;
    text-decoration:none;
    color:#222;
}
</style>
</head>
