<title>UNAILOFOTOS | Fotografía Deportiva</title>

<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<style>
    :root { 
        --rso-blue: #002d72; 
        --neon-blue: #00d4ff; 
        --pure-white: #ffffff; 
        --text-dark: #020205; 
    }
    body { 
        background: linear-gradient(135deg, var(--pure-white) 0%, var(--pure-white) 50%, var(--rso-blue) 50%, var(--rso-blue) 100%);
        background-attachment: fixed;
        color: var(--text-dark); 
        font-family: 'Montserrat', sans-serif; 
        margin: 0; 
        overflow-x: hidden; 
    }

    .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
    .hero-title { z-index: 10; text-align: center; }
    .hero-title h1 { 
        font-family: 'Bebas Neue', cursive; 
        font-size: clamp(80px, 20vw, 220px); 
        line-height: 0.8; 
        margin: 0; 
        letter-spacing: -5px; 
        color: transparent; 
        -webkit-text-stroke: 2px var(--rso-blue); 
        transition: 0.5s; 
    }
    .hero-title h1:hover { color: var(--pure-white); -webkit-text-stroke: 2px var(--neon-blue); }

    /* Galería Flotante */
    .floating-gallery { padding: 100px 50px; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
    .floating-gallery a { position: relative; display: block; transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
    .floating-gallery img { width: 300px; height: 400px; object-fit: cover; border-radius: 4px; border: 4px solid var(--pure-white); filter: saturate(0.7); transition: 0.5s; }
    .floating-gallery a:nth-child(even) { transform: rotate(3deg) translateY(20px); }
    .floating-gallery a:nth-child(odd) { transform: rotate(-3deg) translateY(-20px); }
    .floating-gallery a:hover { transform: rotate(0deg) scale(1.1); z-index: 20; }
    .floating-gallery a:hover img { filter: saturate(1) brightness(1.1); border-color: var(--neon-blue); }

    /* SECCIÓN ÁLBUMES - FORMATO CUADRADO 1:1 */
    .album-section { padding: 100px 20px; text-align: center; }
    .album-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
        gap: 50px; 
        max-width: 1200px; 
        margin: auto; 
    }
    
    .square-album { 
        position: relative; 
        background: var(--pure-white); 
        padding: 12px; /* El borde blanco */
        text-decoration: none; 
        color: var(--rso-blue); 
        transition: 0.4s ease;
        aspect-ratio: 1 / 1; 
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .square-album img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        transition: 0.4s;
    }

    .square-album:hover { 
        transform: scale(1.05); 
        box-shadow: 0 20px 40px rgba(0,45,114,0.3);
        background: var(--rso-blue);
        color: var(--pure-white);
    }

    .ticket-info { 
        padding: 15px 5px; 
        font-family: 'Bebas Neue'; 
        font-size: 1.8rem; 
        letter-spacing: 1px; 
    }

    footer { padding: 80px 20px; background: var(--rso-blue); text-align: center; border-top: 5px solid var(--pure-white); }
    .socials a { color: var(--pure-white); text-decoration: none; margin: 0 15px; font-size: 0.8rem; letter-spacing: 4px; font-weight: 800; transition: 0.3s; opacity: 0.7; }
    .socials a:hover { color: var(--neon-blue); opacity: 1; }
    footer p { margin-top: 40px; color: rgba(255,255,255,0.5); font-size: 0.75rem; }
</style>
</head>
