<title>Unai Lopez | Fotografía deportiva</title>

<style>

body{
font-family:Arial;
margin:0;
background:white;
color:#222;

header{
text-align:center;
padding:50px 20px;

header h1{
margin:0;
font-size:34px;
}

header p{
color:#666;
}

section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* COLLAGE MOSAICO */

.collage{
display:grid;
grid-template-columns: repeat(5,1fr);
grid-auto-rows:180px;
gap:8px;
margin-top:30px;
}

.collage img{
width:100%;
height:100%;
object-fit:cover;
border-radius:6px;
transition:0.25s;
}

.collage img:hover{
transform:scale(1.03);
}

/* tamaños diferentes */

.big{
grid-column: span 2;
grid-row: span 2;
}

.wide{
grid-column: span 2;
}

.tall{
grid-row: span 2;
}

footer{
text-align:center;
padding:40px;
border-top:1px solid #eee;
}

footer a{
margin:0 10px;
text-decoration:none;
color:#222;
}

</style>

</head>

<body>

<header>
<h1>Unai Lopez</h1>
<p>Fotografía deportiva</p>

<section>
<p style="text-align:center; max-width:700px; margin:auto; line-height:1.6;">
