<head>
<meta charset="UTF-8">

<title>UNAILOFOTOS | Fotografía Deportiva</title>
<!-- Fuente Muli (Mulish) y Montserrat -->
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@800&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<style>
    :root { 
        --bg-dark: #0a0a0a; 
        --line-grey: #1a1a1a; 
        --pure-white: #ffffff; 
        --accent: #00d4ff; 
    }

    /* Fondo de líneas zigzag optimizado (sin lag) */
    body { 
        margin: 0; 
        background-color: var(--bg-dark);
        background-image: 
            linear-gradient(135deg, var(--line-grey) 25%, transparent 25%), 
            linear-gradient(225deg, var(--line-grey) 25%, transparent 25%), 
            linear-gradient(45deg, var(--line-grey) 25%, transparent 25%), 
            linear-gradient(315deg, var(--line-grey) 25%, transparent 25%);
        background-position: 40px 0, 40px 0, 0 0, 0 0;
        background-size: 80px 80px;
        background-attachment: fixed;
        color: var(--pure-white);
        font-family: 'Montserrat', sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    .hero { 
        height: 70vh; 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        justify-content: center; 
        text-align: center;
        padding: 0 20px;
    }

    .hero h1 { 
        font-family: 'Mulish', sans-serif; 
        font-size: clamp(40px, 10vw, 120px); 
        margin: 0; 
        letter-spacing: -2px;
        text-transform: uppercase;
        color: var(--pure-white);
    }

    .hero p {
        font-size: clamp(14px, 2vw, 18px);
        max-width: 700px;
        margin-top: 20px;
        line-height: 1.6;
        font-weight: 300;
        color: #aaaaaa;
    }

    /* Galería Main Simplificada */
    .floating-gallery { 
        padding: 40px; 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
        gap: 15px; 
    }
    .floating-gallery a { 
        display: block; 
        border: 4px solid var(--pure-white); 
        transition: transform 0.3s ease;
        overflow: hidden;
    }
    .floating-gallery img { 
        width: 100%; 
        height: 350px; 
        object-fit: cover; 
        display: block; 
    }
    .floating-gallery a:hover { transform: scale(1.02); }

    /* Sección Álbumes Cuadrados 1:1 */
    .album-section { padding: 60px 20px; background: rgba(0,0,0,0.4); }
    .album-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 30px; 
        max-width: 1100px; 
        margin: auto; 
    }
    .square-album { 
        background: var(--pure-white); 
        padding: 10px; 
        text-decoration: none; 
        aspect-ratio: 1 / 1;
        display: flex;
        flex-direction: column;
        transition: 0.3s;
    }
    .square-album img { width: 100%; height: 100%; object-fit: cover; }
    .square-album .info { 
        font-family: 'Mulish', sans-serif; 
        font-size: 1.2rem; 
        color: #000; 
        padding: 15px 0 5px 0; 
        text-align: center;
    }
    .square-album:hover { transform: translateY(-10px); }

    footer { 
        padding: 60px 20px; 
        text-align: center; 
        font-size: 0.9rem;
        border-top: 1px solid var(--line-grey);
    }
    .socials a { color: var(--pure-white); text-decoration: none; margin: 0 15px; opacity: 0.6; transition: 0.3s; }
    .socials a:hover { opacity: 1; color: var(--accent); }
</style>
</head>
