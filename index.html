<style>
    :root {
        --bg: #050505;
        --rso-blue: #0067b1; /* Azul Real Sociedad oficial */
        --rso-white: #ffffff;
        --accent: #00a8ff;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: white;
        margin: 0;
        overflow-x: hidden;
    }

    /* Fondo con Formas Geométricas */
    .bg-geometry {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        opacity: 0.1;
        background: 
            linear-gradient(135deg, var(--rso-blue) 25%, transparent 25%) -50px 0,
            linear-gradient(225deg, var(--rso-blue) 25%, transparent 25%) -50px 0,
            linear-gradient(315deg, var(--rso-blue) 25%, transparent 25%),
            linear-gradient(45deg, var(--rso-blue) 25%, transparent 25%);
        background-size: 100px 100px;
    }

    header {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
    }

    /* Título con corte geométrico */
    header h1 {
        font-family: 'Mulish', sans-serif;
        font-size: clamp(40px, 15vw, 120px);
        line-height: 0.8;
        margin: 0;
        text-transform: uppercase;
        background: linear-gradient(90deg, #fff 50%, var(--rso-blue) 50%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    header p {
        letter-spacing: 10px;
        text-transform: uppercase;
        color: var(--rso-blue);
        font-weight: 700;
        margin-top: 20px;
    }

    /* Galería Estilo "Portfolio Moderno" */
    .gallery-container { padding: 50px 20px; }
    
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 15px;
        max-width: 1400px;
        margin: auto;
    }

    .gallery a {
        position: relative;
        overflow: hidden;
        border-radius: 4px;
        aspect-ratio: 4/5;
        clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%); /* Corte geométrico inferior */
        transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .gallery img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(1) brightness(0.6);
        transition: 0.8s;
    }

    .gallery a:hover {
        transform: scale(0.95);
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 100%);
    }

    .gallery a:hover img {
        filter: grayscale(0) brightness(1.1);
        transform: scale(1.1);
    }

    /* Seccion Álbumes - Cards Diagonales */
    .section-title {
        font-family: 'Mulish';
        text-align: center;
        font-size: 3rem;
        margin: 100px 0 50px;
        color: var(--rso-white);
    }

    .albums {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding-bottom: 100px;
    }

    .album {
        width: 350px;
        height: 450px;
        position: relative;
        text-decoration: none;
        color: white;
        transition: 0.5s;
    }

    .album::before {
        content: "";
        position: absolute;
        top: -10px; left: -10px; width: 100%; height: 100%;
        border: 2px solid var(--rso-blue);
        z-index: -1;
        transition: 0.4s;
    }

    .album img {
        width: 100%; height: 100%;
        object-fit: cover;
        border: 1px solid #333;
    }

    .album-info {
        position: absolute;
        bottom: 20px; left: 20px;
        background: var(--rso-blue);
        padding: 10px 20px;
        transform: skewX(-10deg);
    }

    .album:hover::before {
        top: 10px; left: 10px;
        border-color: white;
    }

    footer {
        padding: 50px;
        background: #000;
        text-align: center;
        border-top: 5px solid var(--rso-blue);
    }
</style>
</head>
