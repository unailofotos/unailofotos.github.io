<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNAILOFOTOS | Fotografía Deportiva</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.1/css/lightgallery-bundle.min.css" rel="stylesheet">
<style>
    :root { 
        --rso-blue: #002d72; 
        --pure-white: #ffffff; 
        --neon: #00d4ff;
    }

    body { 
        margin: 0; 
        font-family: 'Montserrat', sans-serif; 
        /* FONDO ZIGZAG MEZCLA AZUL/BLANCO */
        background-color: var(--pure-white);
        background-image: 
            linear-gradient(135deg, var(--rso-blue) 25%, transparent 25%), 
            linear-gradient(225deg, var(--rso-blue) 25%, transparent 25%), 
            linear-gradient(45deg, var(--rso-blue) 25%, transparent 25%), 
            linear-gradient(315deg, var(--rso-blue) 25%, transparent 25%);
        background-position: 50px 0, 50px 0, 0 0, 0 0;
        background-size: 100px 100px;
        background-repeat: repeat;
        background-attachment: fixed;
        color: #000;
    }

    /* Capa de suavizado para que el zigzag no moleste a la vista */
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.8);
        z-index: -1;
    }

    .hero { 
        height: 100vh; 
        display: flex; 
        flex-direction: column;
        align-items: center; 
        justify-content: center; 
        text-align: center;
    }

    .hero h1 { 
        font-family: 'Bebas Neue'; 
        font-size: clamp(100px, 25vw, 250px); 
        line-height: 0.8; 
        margin: 0; 
        color: var(--rso-blue);
        text-shadow: 8px 8px 0px var(--neon);
        text-transform: uppercase;
    }

    /* Galería de fotos sueltas */
    .floating-gallery { 
        padding: 50px; 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
        gap: 20px; 
    }
    .floating-gallery a { 
        display: block; 
        border: 10px solid var(--pure-white); 
        box-shadow: 10px 10px 0px var(--rso-blue);
        transition: 0.3s;
    }
    .floating-gallery img { width: 100%; height: 400px; object-fit: cover; display: block; }
    .floating-gallery a:hover { transform: translate(-5px, -5px); box-shadow: 15px 15px 0px var(--neon); }

    /* Sección Álbumes Cuadrados 1:1 */
    .album-section { padding: 100px 20px; }
    .album-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
        gap: 40px; 
        max-width: 1100px; 
        margin: auto; 
    }
    .square-album { 
        background: var(--pure-white); 
        padding: 15px; 
        text-decoration: none; 
        border: 2px solid var(--rso-blue);
        aspect-ratio: 1 / 1;
        display: flex;
        flex-direction: column;
        transition: 0.4s;
    }
    .square-album img { width: 100%; height: 100%; object-fit: cover; }
    .square-album .info { 
        font-family: 'Bebas Neue'; 
        font-size: 2rem; 
        color: var(--rso-blue); 
        padding-top: 15px; 
        text-align: center;
    }
    .square-album:hover { transform: scale(1.02); background: var(--rso-blue); }
    .square-album:hover .info { color: var(--pure-white); }

    footer { 
        background: var(--rso-blue); 
        color: white; 
        padding: 60px 20px; 
        text-align: center; 
        font-family: 'Bebas Neue';
        letter-spacing: 2px;
    }
    .socials a { color: var(--neon); text-decoration: none; margin: 0 20px; }
</style>
</head>
